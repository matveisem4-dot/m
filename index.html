<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Магазин</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--text:#fff;--muted:#9ca3af;--purple:#8b5cf6;--cyan:#06b6d4;--grad:linear-gradient(135deg,var(--purple),var(--cyan))}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,rgba(139,92,246,.4),rgba(6,182,212,.4));border-radius:10px}

.glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.glow::before,.glow::after{content:'';position:absolute;border-radius:50%;filter:blur(100px)}
.glow::before{width:600px;height:600px;top:-150px;left:-150px;background:rgba(139,92,246,.07)}
.glow::after{width:600px;height:600px;bottom:-150px;right:-150px;background:rgba(6,182,212,.07)}

.header{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);background:rgba(10,10,15,.85);border-bottom:1px solid var(--border)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:center}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;background:var(--grad);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(139,92,246,.25)}
.logo-text h1{font-size:20px;font-weight:700}
.logo-text span{font-size:11px;color:var(--muted)}

.hero{text-align:center;padding:80px 24px 60px;position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);border-radius:100px;font-size:14px;color:#a78bfa;margin-bottom:28px}
.hero h2{font-size:clamp(36px,7vw,64px);font-weight:900;line-height:1.1;margin-bottom:20px}
.hero h2 .gt{background:linear-gradient(135deg,#a78bfa,#ec4899,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:18px;max-width:550px;margin:0 auto 36px;line-height:1.6}
.search-box{max-width:480px;margin:0 auto;position:relative}
.search-box input{width:100%;padding:16px 20px 16px 52px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;color:white;font-size:16px;font-family:inherit;transition:all .3s}
.search-box input:focus{outline:none;border-color:var(--purple);box-shadow:0 0 30px rgba(139,92,246,.1)}
.search-box input::placeholder{color:#444}
.search-box svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#555}

.section{padding:0 24px 80px;position:relative;z-index:1}
.section-hdr{max-width:1200px;margin:0 auto 32px;display:flex;align-items:center;justify-content:space-between}
.section-hdr p{color:var(--muted);font-size:15px}
.grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}

.card{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1)}
.card:hover{transform:translateY(-8px);border-color:rgba(255,255,255,.15);box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 40px rgba(139,92,246,.08)}
.card-img{height:200px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.card:hover .card-img img{transform:scale(1.05)}
.card-img .icon{width:56px;height:56px;color:rgba(255,255,255,.3);flex-shrink:0}
.price-tag{position:absolute;top:14px;right:14px;z-index:2;padding:6px 14px;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);border-radius:10px;border:1px solid rgba(255,255,255,.1);font-weight:700;font-size:14px}
.card-info{padding:22px}
.card-info h3{font-size:18px;font-weight:700;margin-bottom:8px;transition:color .3s}
.card:hover .card-info h3{color:#c4b5fd}
.card-info p.desc{color:var(--muted);font-size:14px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cta{display:flex;align-items:center;gap:8px;margin-top:18px;color:var(--purple);font-size:14px;font-weight:600;transition:color .3s}
.card:hover .cta{color:var(--cyan)}
.cta .arrow{margin-left:auto;transition:transform .3s}
.card:hover .cta .arrow{transform:translateX(4px)}
.empty{text-align:center;padding:80px 20px;grid-column:1/-1}
.empty svg{color:#333;margin-bottom:20px}
.empty h3{font-size:22px;margin-bottom:8px}
.empty p{color:var(--muted)}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:all .3s}
.modal-overlay.active{opacity:1;visibility:visible}
.modal{width:100%;max-width:520px;max-height:90vh;overflow-y:auto;background:rgba(15,15,25,.97);backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:24px;transform:scale(.9) translateY(20px);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.modal-overlay.active .modal{transform:scale(1) translateY(0)}
.modal-header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(139,92,246,.05),rgba(6,182,212,.05))}
.modal-header h3{font-size:20px;font-weight:700}
.modal-header span{color:var(--muted);font-size:14px;display:block;margin-top:2px}
.modal-close{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(255,255,255,.1);color:white}
.modal-body{padding:28px}
.price-display{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(6,182,212,.08));border:1px solid rgba(255,255,255,.05);border-radius:14px;margin-bottom:24px}
.price-display span:first-child{color:var(--muted)}
.price-display .amount{font-size:26px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.fg{margin-bottom:20px}
.fg label{display:block;font-size:14px;font-weight:500;color:#d1d5db;margin-bottom:8px}
.fg label svg{display:inline;vertical-align:middle;margin-right:6px}
.fi{width:100%;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:white;font-size:15px;font-family:inherit;transition:all .3s}
.fi:focus{outline:none;border-color:var(--purple);box-shadow:0 0 20px rgba(139,92,246,.1)}
.fi::placeholder{color:#444}
.submit-btn{width:100%;padding:16px;background:var(--grad);border:none;border-radius:14px;color:white;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s;margin-top:8px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(139,92,246,.3)}
.success{text-align:center;display:none}
.success.show{display:block;animation:fi .5s ease}
.success-icon{width:72px;height:72px;margin:0 auto 24px;background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(16,185,129,.1));border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(34,197,94,.2)}
.success-icon svg{color:#22c55e}
.success h4{font-size:24px;font-weight:700;margin-bottom:8px}
.success>p{color:var(--muted);margin-bottom:8px;font-size:15px}
.order-detail{padding:18px 22px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;margin-top:16px;text-align:left}
.order-detail-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}
.order-detail-row label{color:var(--muted)}
.order-detail-row value{color:white;font-weight:500}
.close-btn{width:100%;padding:14px;margin-top:24px;background:var(--grad);border:none;border-radius:12px;color:white;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s}
.close-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(139,92,246,.3)}
@keyframes fi{from{opacity:0}to{opacity:1}}
@media(max-width:640px){.header-inner{padding:12px 16px}.hero{padding:50px 16px 40px}.hero h2{font-size:32px}.grid{grid-template-columns:1fr;gap:16px}.section{padding:0 16px 60px}.modal{border-radius:20px;margin:10px}.modal-header,.modal-body{padding:20px}}
</style>
</head>
<body>

<div class="glow"></div>

<header class="header"><div class="header-inner">
<div class="logo">
<div class="logo-icon"><svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
<div class="logo-text"><h1 id="storeName">Магазин</h1><span>Премиум товары</span></div>
</div>
</div></header>

<section class="hero">
<div class="badge"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>Лучшие предложения</div>
<h2>Откройте мир<br><span class="gt">премиум товаров</span></h2>
<p>Уникальные продукты высочайшего качества.</p>
<div class="search-box"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="q" placeholder="Поиск товаров..."></div>
</section>

<section class="section">
<div class="section-hdr"><p>Товаров: <strong id="cnt" style="color:white">0</strong></p></div>
<div class="grid" id="grid"></div>
</section>

<!-- MODAL -->
<div class="modal-overlay" id="mo">
<div class="modal">
<div class="modal-header">
<div><h3>Оформление заказа</h3><span id="mName">-</span></div>
<button class="modal-close" onclick="cm()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
</div>
<div class="modal-body">
<div id="formWrap">
<div class="price-display"><span>Стоимость:</span><span class="amount" id="mPrice">0 ₽</span></div>
<div class="fg"><label><svg width="16" height="16" fill="none" stroke="#a78bfa" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Ваше Имя / Ник</label><input type="text" id="cName" class="fi" placeholder="Как к вам обращаться?"></div>
<div class="fg"><label><svg width="16" height="16" fill="none" stroke="#06b6d4" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Адрес доставки</label><input type="text" id="cAddr" class="fi" placeholder="Улица, дом, квартира..."></div>
<button class="submit-btn" onclick="so()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/><path d="M16 11v6"/><path d="M8 13v6"/></svg>Оформить заказ</button>
</div>
<div class="success" id="okMsg">
<div class="success-icon"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
<h4>Заказ оформлен! ✅</h4>
<p>Спасибо за покупку!</p>
<div class="order-detail" id="oDetail"></div>
<button class="close-btn" onclick="cm()">Отлично!</button>
</div>
</div>
</div>
</div>

<script>
// ====== STORAGE ======
const K={P:'shop_products',O:'shop_orders',S:'shop_name'};
function init(){if(!localStorage.getItem(K.P))localStorage.setItem(K.P,'[]');if(!localStorage.getItem(K.O))localStorage.setItem(K.O,'[]');if(!localStorage.getItem(K.S))localStorage.setItem(K.S,'Магазин')}
function gS(){return localStorage.getItem(K.S)||'Магазин'}
function gP(){try{return JSON.parse(localStorage.getItem(K.P))||[]}catch(e){return[]}}
function gO(){try{return JSON.parse(localStorage.getItem(K.O))||[]}catch(e){return[]}}
function aO(d){const o=gO();o.push({...d,id:Date.now().toString(36)+Math.random().toString(36).substr(2,6)});localStorage.setItem(K.O,JSON.stringify(o))}

let cur=null;
const fp=p=>new Intl.NumberFormat('ru-RU').format(p)+' EGP';
const eh=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};

// INIT
init();
document.getElementById('storeName').textContent=gS();
document.title=gS();
render();

// RENDER
function render(){
  const s=document.getElementById('q').value.toLowerCase().trim();
  let prods=gP();
  if(s)prods=prods.filter(p=>p.name.toLowerCase().includes(s)||(p.description||'').toLowerCase().includes(s));
  document.getElementById('cnt').textContent=prods.length;
  const g=document.getElementById('grid');
  if(!prods.length){
    g.innerHTML='<div class="empty"><svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><h3>'+(s?'Ничего не найдено':'Товаров пока нет')+'</h3><p>'+(s?'Попробуйте другой запрос':'Товары скоро появятся!')+'</p></div>';
    return;
  }
  g.innerHTML=prods.map(p=>'<div class="card" onclick=\'om('+JSON.stringify(p).replace(/'/g,"&#39;")+')\'>'+
    '<div class="card-img">'+(p.image?'<img src="'+eh(p.image)+'" alt="'+eh(p.name)+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><svg class="icon" style="display:none" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>':'<svg class="icon" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>')+
    '<div class="price-price-tag">'+fp(p.price)+'</div></div>'+
    '<div class="card-info"><h3>'+eh(p.name)+'</h3><p class="desc">'+eh(p.description||'')+'</p>'+
    '<div class="cta"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Заказать<svg class="arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div></div></div>').join('');
}
document.getElementById('q').addEventListener('input',render);

// ORDER
function om(p){cur=p;document.getElementById('mName').textContent=p.name;document.getElementById('mPrice').textContent=fp(p.price);document.getElementById('cName').value='';document.getElementById('cAddr').value='';document.getElementById('formWrap').style.display='block';document.getElementById('okMsg').classList.remove('show');document.getElementById('mo').classList.add('active');document.body.style.overflow='hidden'}
function cm(){document.getElementById('mo').classList.remove('active');document.body.style.overflow=''}
function so(){const n=document.getElementById('cName').value.trim(),a=document.getElementById('cAddr').value.trim();if(!n||!a||!cur)return;aO({productId:cur.id,productName:cur.name,productPrice:cur.price,customerName:n,deliveryAddress:a});document.getElementById('oDetail').innerHTML='<div class="order-detail-row"><label>Товар:</label><value>'+eh(cur.name)+'</value></div><div class="order-detail-row"><label>Цена:</label><value>'+fp(cur.price)+'</value></div><div class="order-detail-row"><label>Покупатель:</label><value>'+eh(n)+'</value></div><div class="order-detail-row"><label>Адрес:</label><value>'+eh(a)+'</value></div>';document.getElementById('formWrap').style.display='none';document.getElementById('okMsg').classList.add('show')}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)cm()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cm()});
</script>

</body>
</html>
